<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gull AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0d0d0d;color:#ececec;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.mob-bar{display:none;align-items:center;gap:10px;padding:10px 14px;background:#171717;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
.mob-bar img{width:28px;height:28px;border-radius:7px;object-fit:contain}
.mob-bar span{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;background:linear-gradient(135deg,#a78bfa,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;flex:1}
.hbg{background:none;border:none;color:rgba(255,255,255,.6);cursor:pointer;display:flex;align-items:center}
.hbg svg{width:22px;height:22px;fill:currentColor}
.wrap{flex:1;display:flex;overflow:hidden}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:98}
.overlay.on{display:block}
.sidebar{width:260px;min-width:260px;background:#171717;display:flex;flex-direction:column;padding:12px;gap:4px;border-right:1px solid rgba(255,255,255,.07);transition:left .25s}
.slogo{display:flex;align-items:center;gap:9px;padding:8px 8px 14px;border-bottom:1px solid rgba(255,255,255,.07);margin-bottom:8px}
.slogo img{width:30px;height:30px;border-radius:8px;object-fit:contain}
.slogo span{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;background:linear-gradient(135deg,#a78bfa,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ncbtn{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#ececec;font-size:14px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;margin-bottom:8px;transition:background .2s;width:100%}
.ncbtn:hover{background:rgba(255,255,255,.11)}
.ncbtn svg{width:14px;height:14px;fill:currentColor;opacity:.8}
.hlabel{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:rgba(255,255,255,.28);padding:4px 8px;margin-top:4px}
.srchwrap{position:relative;margin-bottom:6px}
.srchwrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:13px;height:13px;fill:none;stroke:rgba(255,255,255,.28);stroke-width:2;stroke-linecap:round;pointer-events:none}
.srchwrap input{width:100%;padding:7px 9px 7px 30px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:8px;color:#ececec;font-family:'Inter',sans-serif;font-size:12px;outline:none;transition:border-color .2s}
.srchwrap input:focus{border-color:rgba(167,139,250,.4)}
.hist{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.hist::-webkit-scrollbar{width:3px}
.hist::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.hitem{padding:8px 12px;border-radius:8px;font-size:13px;color:rgba(255,255,255,.5);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background .15s}
.hitem:hover{background:rgba(255,255,255,.07);color:#ececec}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat{flex:1;overflow-y:auto;padding:28px 20px;display:flex;flex-direction:column;gap:20px;scroll-behavior:smooth}
.chat::-webkit-scrollbar{width:4px}
.chat::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;min-height:52vh;text-align:center}
.welcome img{width:70px;height:70px;border-radius:50%;object-fit:cover;margin-bottom:20px;filter:drop-shadow(0 0 20px rgba(167,139,250,.35))}
.welcome h2{font-size:24px;font-weight:700;margin-bottom:10px}
.welcome p{color:rgba(255,255,255,.4);font-size:14px;line-height:1.6;max-width:360px}
.msg{display:flex;gap:12px;max-width:740px;margin:0 auto;width:100%}
.msg.user{flex-direction:row-reverse}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.av.ai{background:linear-gradient(135deg,#a78bfa,#818cf8)}
.av.ai img{width:100%;height:100%;object-fit:cover}
.av.me{background:rgba(255,255,255,.1);font-size:15px}
.sname{font-size:11px;font-weight:600;color:rgba(255,255,255,.28);margin-bottom:4px}
.bub{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:11px 15px;font-size:14px;line-height:1.65;color:#e2e8f0;max-width:660px}
.msg.user .bub{background:rgba(167,139,250,.12);border-color:rgba(167,139,250,.2)}
.acts{display:flex;gap:5px;margin-top:5px}
.abtn{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:6px;color:rgba(255,255,255,.32);font-size:11px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .2s}
.abtn:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.7)}
.abtn.ed:hover{background:rgba(167,139,250,.1);color:#a78bfa;border-color:rgba(167,139,250,.3)}
.abtn svg{width:10px;height:10px;fill:currentColor}
.editbox{display:none;flex-direction:column;gap:6px;margin-top:7px}
.editbox textarea{background:rgba(255,255,255,.05);border:1px solid rgba(167,139,250,.3);border-radius:10px;padding:9px 13px;color:#ececec;font-family:'Inter',sans-serif;font-size:14px;resize:none;min-height:56px;outline:none;width:100%}
.ebtns{display:flex;gap:6px}
.esave{padding:5px 13px;background:rgba(167,139,250,.2);border:1px solid rgba(167,139,250,.4);border-radius:8px;color:#a78bfa;font-size:12px;font-family:'Inter',sans-serif;cursor:pointer}
.ecanc{padding:5px 13px;background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:8px;color:rgba(255,255,255,.4);font-size:12px;font-family:'Inter',sans-serif;cursor:pointer}
.typing{display:flex;gap:12px;max-width:740px;margin:0 auto;width:100%}
.tbub{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:13px 17px;display:flex;gap:5px;align-items:center}
.tbub span{width:7px;height:7px;background:rgba(255,255,255,.4);border-radius:50%;animation:bo 1.2s ease-in-out infinite}
.tbub span:nth-child(2){animation-delay:.2s}
.tbub span:nth-child(3){animation-delay:.4s}
@keyframes bo{0%,80%,100%{transform:scale(.8);opacity:.4}40%{transform:scale(1.2);opacity:1}}
.inpwrap{padding:10px 20px 16px;display:flex;flex-direction:column;align-items:center}
.fprev{display:none;max-width:720px;width:100%;margin-bottom:7px}
.fprev-in{background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.2);border-radius:9px;padding:7px 12px;display:flex;align-items:center;gap:9px;font-size:13px;color:rgba(255,255,255,.65)}
.fprev-in button{margin-left:auto;background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;font-size:15px}
.inpbox{display:flex;align-items:flex-end;gap:8px;background:#222;border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:9px 11px 9px 15px;width:100%;max-width:720px;transition:border-color .2s,box-shadow .2s}
.inpbox:focus-within{border-color:rgba(167,139,250,.5);box-shadow:0 0 0 3px rgba(167,139,250,.07)}
.attbtn{width:30px;height:30px;background:transparent;border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.28);transition:color .2s;flex-shrink:0}
.attbtn:hover{color:rgba(167,139,250,.8)}
.attbtn svg{width:17px;height:17px}
#inp{flex:1;background:transparent;border:none;outline:none;color:#ececec;font-family:'Inter',sans-serif;font-size:14.5px;line-height:1.6;resize:none;max-height:140px;min-height:24px;height:24px;overflow-y:auto}
#inp::placeholder{color:rgba(255,255,255,.22)}
.sndbtn{width:34px;height:34px;background:linear-gradient(135deg,#a78bfa,#818cf8);border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .2s;flex-shrink:0}
.sndbtn:hover{opacity:.85}
.sndbtn svg{width:14px;height:14px;fill:white}
.hint{font-size:11px;color:rgba(255,255,255,.18);margin-top:6px}
.langmod{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.langbox{background:#1c1c1c;border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:34px 42px;text-align:center;max-width:330px;width:90%}
.langbox h2{font-size:20px;font-weight:700;margin:12px 0 5px}
.langbox p{color:rgba(255,255,255,.32);font-size:13px;margin-bottom:20px}
.langbtns{display:flex;flex-direction:column;gap:9px}
.lbtn{padding:13px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:#252525;color:#ececec;font-size:14px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;width:100%}
.lbtn:hover{background:rgba(167,139,250,.15);border-color:rgba(167,139,250,.4);color:#a78bfa}
@media(max-width:700px){
  .mob-bar{display:flex}
  .sidebar{position:fixed;left:-270px;top:0;bottom:0;z-index:99;width:260px}
  .sidebar.on{left:0}
  .chat{padding:12px 10px}
  .inpwrap{padding:8px 10px 13px}
}
</style>
</head>
<body>

<div class="langmod" id="langmod">
  <div class="langbox">
    <div style="font-size:38px">&#127760;</div>
    <h2>Dil se&#231;in</h2>
    <p>Choose your language</p>
    <div class="langbtns">
      <button class="lbtn" id="laz">&#127462;&#127487; Az&#601;rbaycan dili</button>
      <button class="lbtn" id="ltr">&#127481;&#127479; T&#252;rk&#231;e</button>
      <button class="lbtn" id="len">&#127468;&#127463; English</button>
    </div>
  </div>
</div>

<div class="mob-bar">
  <button class="hbg" id="hbg"><svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg></button>
  <img id="mob-logo" src="" alt="Gull AI">
  <span>Gull AI</span>
</div>

<div class="overlay" id="overlay"></div>

<div class="wrap">
  <div class="sidebar" id="sidebar">
    <div class="slogo">
      <img id="sb-logo" src="" alt="Gull AI">
      <span>Gull AI</span>
    </div>
    <button class="ncbtn" id="ncbtn">
      <svg viewBox="0 0 24 24"><path d="M19 11H13V5a1 1 0 00-2 0v6H5a1 1 0 000 2h6v6a1 1 0 002 0v-6h6a1 1 0 000-2z"/></svg>
      <span id="nc-lbl">Yeni s&#246;hb&#601;t</span>
    </button>
    <div class="hlabel" id="hl-lbl">Son s&#246;hb&#601;tl&#601;r</div>
    <div class="srchwrap">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="6"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="srch" placeholder="S&#246;hb&#601;t axtar...">
    </div>
    <div class="hist" id="hist"></div>
  </div>

  <div class="main">
    <div class="chat" id="chat">
      <div class="welcome" id="welcome">
        <img id="wlc-logo" src="" alt="Gull AI">
        <h2 id="wlc-title">Gull AI il&#601; dan&#305;&#351;&#305;n</h2>
        <p id="wlc-sub">Texnologiya, AI, proqramlа&#351;d&#305;rma v&#601; r&#601;q&#601;msal d&#252;nya hаqq&#305;nda suаllar&#305;n&#305;za cаvаb verir&#601;m.</p>
      </div>
    </div>
    <div class="inpwrap">
      <div class="fprev" id="fprev">
        <div class="fprev-in">
          <span id="fname">&#128206;</span>
          <button onclick="clearFile()">&#10005;</button>
        </div>
      </div>
      <div class="inpbox">
        <input type="file" id="finput" accept="image/*,.pdf" style="display:none">
        <button class="attbtn" id="attbtn" title="Fayl">
          <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <textarea id="inp" rows="1" placeholder="Mesaj&#305;n&#305;z&#305; yaz&#305;n..."></textarea>
        <button class="sndbtn" id="sndbtn">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
      <p class="hint" id="hint">Enter &#8212; g&#246;nd&#601;r &nbsp;&#183;&nbsp; Shift+Enter &#8212; yeni s&#601;tir</p>
    </div>
  </div>
</div>

}

});

function clearFile(){selFile=null;selData=null;document.getElementById('fprev').style.display='none';document.getElementById('finput').value='';}

function newChat(){
  if(msgs.length>1){
    var first=null;for(var i=0;i<msgs.length;i++){if(msgs[i].role==='user'){first=msgs[i];break;}}
    if(first){var txt=typeof first.content==='string'?first.content:first.content[0].text;sessions.push(msgs.slice());addHistItem(txt.substring(0,36)+(txt.length>36?'...':''),sessions.length-1);}
  }
  msgs=[msgs[0]];var t=T[lang];
  document.getElementById('chat').innerHTML='<div class="welcome" id="welcome"><img id="wlc-logo" src="'+LOGO+'" alt="Gull AI"><h2 id="wlc-title">'+t.title+'</h2><p id="wlc-sub">'+t.sub+'</p></div>';
  document.getElementById('sidebar').classList.remove('on');document.getElementById('overlay').classList.remove('on');
}

function addHistItem(text,idx){
  var d=document.createElement('div');d.className='hitem';d.textContent=text;d.dataset.idx=idx;
  d.addEventListener('click',function(){loadSession(parseInt(this.dataset.idx));});
  document.getElementById('hist').insertBefore(d,document.getElementById('hist').firstChild);
}

function loadSession(idx){
  if(!sessions[idx])return;msgs=sessions[idx].slice();
  var chat=document.getElementById('chat');chat.innerHTML='';
  for(var i=1;i<msgs.length;i++){var m=msgs[i];if(m.role==='user'){addBubble('user',typeof m.content==='string'?m.content:m.content[0].text);}else if(m.role==='assistant'){addBubble('ai',m.content);}}
  document.getElementById('sidebar').classList.remove('on');document.getElementById('overlay').classList.remove('on');
}

async function sendMsg(){
  var input=document.getElementById('inp');var text=input.value.trim();
  if(!text&&!selFile)return;
  addBubble('user',text+(selFile?'\n&#128206; '+selFile.name:''));
  input.value='';input.style.height='24px';
  var content=text;
  if(selFile&&selData&&selFile.type.indexOf('image')>=0){content=[{type:'text',text:text||'Bu s\u0259kli analiz et'},{type:'image_url',image_url:{url:selData}}];}
  msgs.push({role:'user',content:content});clearFile();await callAPI();
}

async function callAPI(){
  showTyping();
  try{
        var r = await fetch('/api/chat', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ messages: msgs })
    });

    if (!r.ok) {
      throw new Error('API xətası: ' + r.status);
    }

    var d = await r.json();
    var reply = d.choices[0].message.content;

    msgs.push({role:'assistant',content:reply});
    removeTyping();
    addBubble('ai', reply);
  }catch(e){removeTyping();addBubble('ai',T[lang].err);}
}

function addBubble(role,text){
  var welcome=document.getElementById('welcome');if(welcome)welcome.remove();
  var chat=document.getElementById('chat');var id='b'+(++uid);var t=T[lang];
  var d=document.createElement('div');d.className='msg '+role;
  var safe=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  var safeAttr=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  if(role==='ai'){
    d.innerHTML='<div class="av ai"><img src="'+LOGO+'" alt="Gull AI"></div><div style="flex:1"><div class="sname">Gull AI</div><div class="bub" id="'+id+'">'+safe+'</div><div class="acts"><button class="abtn" data-id="'+id+'" data-act="copy"><svg viewBox="0 0 24 24"><path d="M16 1H4a2 2 0 00-2 2v14h2V3h12V1zm3 4H8a2 2 0 00-2 2v14a2 2 0 002 2h11a2 2 0 002-2V7a2 2 0 00-2-2zm0 16H8V7h11v14z"/></svg> <span>'+t.copy+'</span></button></div></div>';
  }else{
    d.innerHTML='<div class="av me">&#128100;</div><div style="flex:1"><div class="sname">'+t.you+'</div><div class="bub" id="'+id+'">'+safe+'</div><div class="acts"><button class="abtn" data-id="'+id+'" data-act="copy"><svg viewBox="0 0 24 24"><path d="M16 1H4a2 2 0 00-2 2v14h2V3h12V1zm3 4H8a2 2 0 00-2 2v14a2 2 0 002 2h11a2 2 0 002-2V7a2 2 0 00-2-2zm0 16H8V7h11v14z"/></svg> <span>'+t.copy+'</span></button><button class="abtn ed" data-id="'+id+'" data-act="edit"><svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg> <span>'+t.edit+'</span></button></div><div class="editbox" id="e'+id+'"><textarea>'+safeAttr+'</textarea><div class="ebtns"><button class="esave" data-id="'+id+'">'+t.send+'</button><button class="ecanc" data-id="'+id+'">'+t.cancel+'</button></div></div></div>';
  }
  chat.appendChild(d);chat.scrollTop=chat.scrollHeight;
  d.querySelectorAll('.abtn').forEach(function(btn){
    btn.addEventListener('click',function(){
      var bid=this.dataset.id,act=this.dataset.act;
      if(act==='copy'){var sp=this.querySelector('span');navigator.clipboard.writeText(document.getElementById(bid).innerText).then(function(){sp.textContent=T[lang].copied;setTimeout(function(){sp.textContent=T[lang].copy;},2000);});}
      else if(act==='edit'){var eb=document.getElementById('e'+bid);eb.style.display='flex';var ta=eb.querySelector('textarea');ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';}
    });
  });
  d.querySelectorAll('.esave').forEach(function(btn){
    btn.addEventListener('click',function(){
      var bid=this.dataset.id,eb=document.getElementById('e'+bid),newText=eb.querySelector('textarea').value.trim();
      if(!newText)return;
      document.getElementById(bid).innerHTML=newText.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
      eb.style.display='none';
      for(var i=msgs.length-1;i>=0;i--){if(msgs[i].role==='user'){msgs[i].content=newText;msgs=msgs.slice(0,i+1);break;}}
      var parent=btn.closest('.msg'),all=chat.querySelectorAll('.msg'),found=false;
      all.forEach(function(el){if(found)el.remove();if(el===parent)found=true;});
      callAPI();
    });
  });
  d.querySelectorAll('.ecanc').forEach(function(btn){btn.addEventListener('click',function(){document.getElementById('e'+this.dataset.id).style.display='none';});});
}

function showTyping(){var chat=document.getElementById('chat');var d=document.createElement('div');d.className='typing';d.id='typing';d.innerHTML='<div class="av ai"><img src="'+LOGO+'" alt="Gull AI"></div><div class="tbub"><span></span><span></span><span></span></div>';chat.appendChild(d);chat.scrollTop=chat.scrollHeight;}
function removeTyping(){var t=document.getElementById('typing');if(t)t.remove();}

})();
</script>
</body>
</html>
